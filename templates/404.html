{% extends "base.html" %}

{% block title %}404 - Page Not Found | Nainno Investment Eswatini Pty{% endblock %}

{% block content %}
<section class="min-h-[70vh] flex items-center justify-center text-center">
    <div class="animate-fade-in px-6">
        <h1 class="text-9xl font-bold text-neon mb-4 opacity-50">404</h1>
        <h2 class="text-3xl md:text-5xl font-bold mb-6">Oops! <span class="text-white">Page Not Found</span></h2>
        <p class="text-slate-400 max-w-md mx-auto mb-10 text-lg">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <a href="{{ url_for('home') }}" class="btn-primary inline-flex items-center">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back to Home
        </a>
    </div>
</section>
{% endblock %}
