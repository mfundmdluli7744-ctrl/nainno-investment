<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nainno Solutions Eswatini Pty{% endblock %}</title>
    <meta name="description" content="Nainno Solutions Eswatini Pty - Empowering Eswatini Through Innovation & Excellence.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#020617',
                        neon: '#00b4d8',
                    }
                }
            }
        }
    </script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="bg-dark text-slate-100 min-h-screen flex flex-col">

    {% include 'navbar.html' %}

    <main class="flex-grow">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="container mx-auto mt-4 px-4">
              {% for category, message in messages %}
                <div class="glass-card neon-border p-4 mb-4 {% if category == 'success' %}text-neon{% else %}text-red-400{% endif %} animate-fade-in">
                  {{ message }}
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    {% include 'footer.html' %}

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/validation.js') }}"></script>
</body>
</html>
